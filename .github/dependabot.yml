version: 2
updates:
  # Keep pinned GitHub Actions current. (The reusable gate pins its own actions
  # in cordon; this covers any workflow actions a repo adds of its own.)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 3
    labels: ["dependencies", "github-actions"]

  # Uncomment the ecosystem this repo actually uses:
